name: Cleanup Expired Invitations

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      purge_retained:
        description: 'Also purge retained expired docs'
        required: false
        default: 'false'
        type: boolean

jobs:
  cleanup:
    name: Purge expired invitations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run invitation cleanup (apply)
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npx tsx scripts/cleanupExpiredInvitations.ts --apply

      - name: Run invitation cleanup (purge retained)
        if: ${{ github.event.inputs.purge_retained == 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npx tsx scripts/cleanupExpiredInvitations.ts --apply --purge-retained
